<!--
  [INPUT]: 依赖 viewer.js 与 three importmap 提供的数字孪生渲染能力。
  [OUTPUT]: 对外提供 model_viewer iframe 宿主页，承载画布、加载遮罩、错误占位与右下角缩略导航 HUD，并让静态底色与 loading skeleton 一并对齐 Electron digital twin shell。
  [POS]: web/model_viewer 的静态入口，被 Flutter 数字孪生页面通过 HtmlElementView 嵌入。
  [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local 3D Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #121316;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #viewer-hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 4;
      }
      .viewer-hint {
        position: absolute;
        left: 18px;
        bottom: 18px;
        display: none;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(114, 121, 139, 0.3);
        background: rgba(18, 19, 22, 0.8);
        color: rgba(232, 236, 242, 0.88);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
        font-size: 12px;
        line-height: 1.3;
        letter-spacing: 0.3px;
        backdrop-filter: blur(10px);
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      }
      .viewer-mini-map {
        position: absolute;
        right: 18px;
        bottom: 18px;
        width: 192px;
        padding: 12px;
        border-radius: 18px;
        border: 1px solid rgba(114, 121, 139, 0.34);
        background: rgba(18, 19, 22, 0.84);
        color: rgba(255, 255, 255, 0.88);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(14px);
        pointer-events: auto;
        user-select: none;
      }
      .viewer-mini-map[hidden] {
        display: none !important;
      }
      .viewer-mini-map__title {
        margin-bottom: 8px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.32px;
        text-transform: uppercase;
        color: rgba(228, 234, 244, 0.92);
      }
      .viewer-mini-map__copy {
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.4;
        color: rgba(197, 205, 218, 0.72);
      }
      #mini-map-canvas {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 0.72;
        border-radius: 12px;
        border: 1px solid rgba(114, 121, 139, 0.22);
        background:
          linear-gradient(rgba(114, 121, 139, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(114, 121, 139, 0.08) 1px, transparent 1px),
          rgba(10, 12, 16, 0.92);
        background-size: 22px 22px, 22px 22px, auto;
        cursor: grab;
        touch-action: none;
      }
      #mini-map-canvas.is-dragging {
        cursor: grabbing;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          linear-gradient(rgba(114, 121, 139, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(114, 121, 139, 0.08) 1px, transparent 1px),
          radial-gradient(circle at 8% 8%, rgba(115, 255, 180, 0.08), transparent 36%),
          rgba(18, 19, 22, 0.96);
        background-size: 32px 32px, 32px 32px, auto, auto;
        color: rgba(255, 255, 255, 0.75);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
        letter-spacing: 0.4px;
      }
      .loading-shell {
        width: min(860px, calc(100% - 64px));
        display: grid;
        gap: 18px;
      }
      .skeleton-header,
      .skeleton-stage,
      .skeleton-toolbar span {
        position: relative;
        overflow: hidden;
        background: rgba(31, 35, 43, 0.96);
      }
      .skeleton-header::after,
      .skeleton-stage::after,
      .skeleton-toolbar span::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.14),
          transparent
        );
        animation: skeleton-shimmer 1.6s ease-in-out infinite;
      }
      .skeleton-header {
        width: 220px;
        height: 18px;
        border-radius: 999px;
      }
      .skeleton-stage {
        height: min(56vh, 540px);
        border-radius: 24px;
        border: 1px solid rgba(114, 121, 139, 0.34);
        background:
          linear-gradient(180deg, rgba(18, 19, 22, 0.98), rgba(31, 35, 43, 0.92)),
          rgba(18, 19, 22, 0.98);
      }
      .skeleton-toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .skeleton-toolbar span {
        display: block;
        width: 120px;
        height: 32px;
        border-radius: 12px;
      }
      .loading-copy {
        display: grid;
        gap: 6px;
      }
      .loading-copy strong {
        font-size: 18px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.92);
      }
      .loading-copy span {
        font-size: 13px;
        line-height: 1.5;
        color: rgba(205, 211, 222, 0.76);
      }
      @keyframes skeleton-shimmer {
        100% {
          transform: translateX(100%);
        }
      }
      #error {
        display: none;
        max-width: 70%;
        margin-top: 6px;
        color: rgba(255, 126, 126, 0.96);
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
        text-align: left;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewer-hud">
        <div id="drag-hint" class="viewer-hint"></div>
        <div id="mini-map" class="viewer-mini-map" hidden>
          <div class="viewer-mini-map__title">缩略导航</div>
          <canvas id="mini-map-canvas"></canvas>
          <div class="viewer-mini-map__copy">拖拽缩略图可平移当前视角</div>
        </div>
      </div>
      <div id="overlay">
        <div class="loading-shell">
          <div class="skeleton-header"></div>
          <div class="skeleton-stage"></div>
          <div class="skeleton-toolbar">
            <span></span><span></span><span></span>
          </div>
          <div class="loading-copy">
            <strong>数字孪生加载中</strong>
            <span>正在等待首帧心跳与场景状态同步…</span>
            <div id="error"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- three examples/jsm 内部会 import "three"，必须用 importmap 映射 -->
    <!-- 同源 vendor，避免 CDN 不可达时 ES module 加载失败导致数字孪生画布空白 -->
    <script type="importmap">
      {
        "imports": {
          "three": "./third_party/three/build/three.module.js",
          "three/addons/": "./third_party/three/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
