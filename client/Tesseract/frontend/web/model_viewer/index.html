<!--
  [INPUT]: 依赖 viewer.js 与 three importmap 提供的数字孪生渲染能力。
  [OUTPUT]: 对外提供 model_viewer iframe 宿主页，仅承载画布、加载遮罩与错误占位。
  [POS]: web/model_viewer 的静态入口，被 Flutter 数字孪生页面通过 HtmlElementView 嵌入。
  [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local 3D Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e1a;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        background: rgba(10, 14, 26, 0.85);
        color: rgba(255, 255, 255, 0.75);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
        letter-spacing: 0.4px;
      }
      #hint {
        font-size: 12px;
        opacity: 0.8;
      }
      #progress {
        width: 260px;
        height: 6px;
        border-radius: 6px;
        overflow: hidden;
        background: rgba(0, 217, 255, 0.15);
      }
      #bar {
        width: 20%;
        height: 100%;
        background: rgba(0, 217, 255, 0.8);
        animation: indeterminate 1.2s infinite ease-in-out;
      }
      @keyframes indeterminate {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(520%);
        }
      }
      #error {
        max-width: 70%;
        color: rgba(255, 110, 110, 0.95);
        font-size: 12px;
        white-space: pre-wrap;
        text-align: center;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="overlay">
        <div id="progress"><div id="bar"></div></div>
        <div id="hint">Loading 3D model(s) (glTF / GLB)…</div>
        <div id="error" style="display: none"></div>
      </div>
    </div>

    <!-- three examples/jsm 内部会 import "three"，必须用 importmap 映射 -->
    <!-- 同源 vendor，避免 CDN 不可达时 ES module 加载失败导致数字孪生画布空白 -->
    <script type="importmap">
      {
        "imports": {
          "three": "./third_party/three/build/three.module.js",
          "three/addons/": "./third_party/three/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
