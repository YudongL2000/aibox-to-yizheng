@if(loaded){
<div class="float-zone">
  <div class="float-sider" [ngClass]="{'show': show}">
    @if (workspaceMode === 'tesseract') {
      @if (hasProjectContext) {
        <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
          nzTooltipTitle="项目设置" (click)="openSettings()">
          <i class="fa-light fa-folder-bookmark"></i>
        </div>
        <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
          nzTooltipTitle="3D 模型" (click)="openThreeDModel()">
          <i class="fa-light fa-cubes"></i>
        </div>
      }
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
        nzTooltipTitle="模型库" (click)="openModelLibrary()">
        <i class="fa-light fa-microchip-ai"></i>
      </div>
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
        nzTooltipTitle="工作流模板" (click)="openWorkflowTemplates()">
        <i class="fa-light fa-sitemap"></i>
      </div>
      @if (hasProjectContext) {
        <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
          nzTooltipTitle="文档" (click)="openDocUrl()">
          <i class="fa-light fa-book"></i>
        </div>
      }
      <div class="line"></div>
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
        nzTooltipTitle="反馈" (click)="openFeedback()">
        <i class="fa-light fa-message-pen"></i>
      </div>
    } @else if (workspaceMode === 'legacy') {
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
        [nzTooltipTitle]="'FLOAT_SIDER.PROJECT_SETTINGS' | translate" (click)="openSettings()">
        <i class="fa-light fa-folder-bookmark"></i>
      </div>
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left" [nzTooltipTitle]="'FLOAT_SIDER.PINMAP' | translate"
        (click)="showPinmap()">
        <i class="fa-light fa-microchip"></i>
      </div>
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left" [nzTooltipTitle]="'FLOAT_SIDER.CIRCUIT' | translate"
        (click)="showCircuit()">
        <i class="fa-light fa-code-branch"></i>
      </div>
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left"
        [nzTooltipTitle]="'FLOAT_SIDER.DOCUMENTATION' | translate" (click)="openDocUrl()">
        <i class="fa-light fa-book"></i>
      </div>
      <div class="line"></div>
      <div class="item ccenter" nz-tooltip nzTooltipPlacement="left" [nzTooltipTitle]="'FLOAT_SIDER.FEEDBACK' | translate"
        (click)="openFeedback()">
        <i class="fa-light fa-message-pen"></i>
      </div>
    }
  </div>
</div>
<app-image-viewer #imageViewer></app-image-viewer>
}
