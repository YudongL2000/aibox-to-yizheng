  openvpn_flutter: ^1.2.2 #平板vpn功能
  #  web_benchmarks: ^0.1.0+3
  pin_code_fields: ^8.0.1
  crypto: ^3.0.1
  just_the_tooltip: ^0.0.12
  roundcheckbox: ^2.0.5
  dropdown_button2: ^2.0.0
  group_radio_button: ^1.3.0
  model_viewer_plus: ^1.9.2
  mqtt_client: ^10.2.0
  video_player: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
