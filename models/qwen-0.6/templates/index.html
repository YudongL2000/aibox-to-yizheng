<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen-0.6 聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: 90vh;
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .system-prompt-section {
            margin-bottom: 20px;
        }

        .system-prompt-section label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .system-prompt-section textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .system-prompt-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
            padding: 0 4px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 18px;
            color: #999;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .sidebar {
                order: 2;
                max-height: 300px;
            }

            .chat-container {
                order: 1;
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h2>设置</h2>
            
            <div class="system-prompt-section">
                <label for="systemPrompt">系统提示词</label>
                <textarea id="systemPrompt" placeholder="输入系统提示词，例如：简短回答所有问题"></textarea>
                <button class="btn btn-primary" onclick="updateSystemPrompt()">更新系统提示词</button>
            </div>

            <button class="btn btn-secondary" onclick="resetConversation()">重置对话</button>
            <button class="btn btn-secondary" onclick="loadSystemPrompt()">加载当前提示词</button>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container">
            <div class="chat-header">
                <h1>Qwen-0.6 聊天助手</h1>
                <p>与 AI 助手进行对话</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div>
                        <div class="message-label">助手</div>
                        <div class="message-content">
                            你好！我是 Qwen-0.6 聊天助手，有什么可以帮助你的吗？
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <div id="statusMessage"></div>
                <div class="chat-input-wrapper">
                    <input 
                        type="text" 
                        id="chatInput" 
                        class="chat-input" 
                        placeholder="输入消息..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let isLoading = false;

        // 页面加载时获取当前系统提示词
        window.onload = function() {
            loadSystemPrompt();
        };

        // 加载系统提示词
        async function loadSystemPrompt() {
            try {
                const response = await fetch(`${API_BASE}/system_prompt`);
                
                // 检查响应状态
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                if (data.success) {
                    const promptValue = data.prompt || '';
                    document.getElementById('systemPrompt').value = promptValue;
                    if (promptValue) {
                        showStatus('系统提示词已加载', 'success');
                    } else {
                        showStatus('当前系统提示词为空', 'success');
                    }
                } else {
                    showStatus(data.error || '加载系统提示词失败', 'error');
                    console.error('加载失败:', data);
                }
            } catch (error) {
                console.error('加载系统提示词错误:', error);
                showStatus(`加载系统提示词失败: ${error.message}`, 'error');
            }
        }

        // 更新系统提示词
        async function updateSystemPrompt() {
            const prompt = document.getElementById('systemPrompt').value.trim();
            if (!prompt) {
                showStatus('系统提示词不能为空', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/system_prompt`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                if (data.success) {
                    showStatus('系统提示词已更新', 'success');
                } else {
                    showStatus(data.error || '更新失败', 'error');
                }
            } catch (error) {
                showStatus('更新系统提示词失败', 'error');
            }
        }

        // 重置对话
        async function resetConversation() {
            if (!confirm('确定要重置对话历史吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/reset`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})  // 明确发送空对象
                });

                // 检查响应状态
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                if (data.success) {
                    const messagesDiv = document.getElementById('chatMessages');
                    messagesDiv.innerHTML = `
                        <div class="message assistant">
                            <div>
                                <div class="message-label">助手</div>
                                <div class="message-content">
                                    对话历史已重置。有什么可以帮助你的吗？
                                </div>
                            </div>
                        </div>
                    `;
                    showStatus('对话历史已重置', 'success');
                } else {
                    showStatus(data.error || '重置失败', 'error');
                    console.error('重置失败:', data);
                }
            } catch (error) {
                console.error('重置对话错误:', error);
                showStatus(`重置对话失败: ${error.message}`, 'error');
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message || isLoading) {
                return;
            }

            // 添加用户消息到界面
            addMessage('user', message);
            input.value = '';
            
            // 显示加载状态
            const loadingId = addMessage('assistant', '', true);
            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // 移除加载消息
                removeMessage(loadingId);

                if (data.success) {
                    addMessage('assistant', data.reply);
                } else {
                    addMessage('assistant', `错误: ${data.error || '未知错误'}`);
                }
            } catch (error) {
                removeMessage(loadingId);
                addMessage('assistant', `网络错误: ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        // 添加消息到界面
        function addMessage(role, content, isLoading = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageId = 'msg-' + Date.now();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.id = messageId;
            
            const label = role === 'user' ? '你' : '助手';
            const messageContent = isLoading 
                ? '<div class="loading">思考中</div>'
                : `<div class="message-content">${escapeHtml(content)}</div>`;
            
            messageDiv.innerHTML = `
                <div>
                    <div class="message-label">${label}</div>
                    ${messageContent}
                </div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return messageId;
        }

        // 移除消息
        function removeMessage(messageId) {
            const message = document.getElementById(messageId);
            if (message) {
                message.remove();
            }
        }

        // 设置加载状态
        function setLoading(loading) {
            isLoading = loading;
            const sendBtn = document.getElementById('sendBtn');
            const chatInput = document.getElementById('chatInput');
            
            sendBtn.disabled = loading;
            chatInput.disabled = loading;
            
            if (loading) {
                sendBtn.textContent = '发送中...';
            } else {
                sendBtn.textContent = '发送';
            }
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 显示状态消息
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = type === 'error' ? 'error-message' : 'success-message';
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
