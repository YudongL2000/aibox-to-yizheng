  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.0.6
  dio: ^4.0.0
  provider: ^6.0.0
  pull_to_refresh: ^2.0.0
  flutter_typeahead: ^4.0.2
  event_bus: ^2.0.0
  flutter_easyloading: ^3.0.0
  focus_detector: ^2.0.0
  flutter_screenutil: ^5.5.4
  numberpicker: ^2.1.1
  path_provider: ^2.0.2
  photo_view: ^0.13.0
  equatable: ^2.0.3
  qr_flutter: ^4.0.0
  # tencent_im_sdk_plugin: ^4.2.0 (已停止维护，已移除)
  # tencent_im_sdk_plugin_web: ^0.3.3 (已停止维护，已移除)
  flutter_plugin_record_plus: ^0.0.15
  file_picker: ^8.0.0
  cached_network_image: ^3.1.0+1
  percent_indicator: ^3.4.0
  dotted_border: ^2.0.0+1
  build_runner: ^2.1.5
  intl: ^0.17.0
  webview_flutter: ^4.13.0
  # webview_windows: ^0.1.6 (已移除，使用 webview_flutter)
  # webviewx: ^0.2.2 (已移除，Web平台使用iframe，native平台可后续迁移到webview_flutter 4.x)
  flutter_slidable: any
  graphview: ^1.1.1
  extended_image: ^6.0.2+1
  date_format: ^2.0.6
  pointer_interceptor: 0.9.1
  audioplayers: ^6.0.0
  decimal: ^2.2.0
  connectivity_plus: any
  # tencent_trtc_cloud: 2.4.0 (已停止维护，已移除)
  permission_handler: ^10.1.0
  image_picker: ^0.8.6+1
  camera: ^0.10.3
