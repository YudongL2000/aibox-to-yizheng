<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tesseract Digital Twin</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(0, 217, 255, 0.18), transparent 42%),
          linear-gradient(180deg, #06111c 0%, #050914 100%);
        font-family:
          "SF Pro Display",
          "PingFang SC",
          "Helvetica Neue",
          Arial,
          sans-serif;
      }

      body {
        color: rgba(255, 255, 255, 0.88);
      }

      #stage {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #viewer-frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        background: rgba(5, 10, 19, 0.58);
        transition: opacity 180ms ease;
      }

      #overlay.hidden {
        opacity: 0;
      }

      .status-card {
        min-width: 280px;
        max-width: 520px;
        padding: 18px 22px;
        border: 1px solid rgba(0, 217, 255, 0.18);
        border-radius: 20px;
        background: rgba(9, 15, 28, 0.84);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(20px);
      }

      .status-title {
        margin: 0 0 10px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status-copy {
        margin: 0;
        font-size: 13px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.68);
      }

      .status-copy.error {
        color: rgba(255, 126, 126, 0.96);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <iframe id="viewer-frame" title="Digital Twin 3D Viewer"></iframe>
      <div id="overlay">
        <div class="status-card">
          <h1 class="status-title" id="status-title">Digital Twin</h1>
          <p class="status-copy" id="status-copy">等待主工作区下发场景数据…</p>
        </div>
      </div>
    </div>

    <script type="module" src="./desktop-host.js"></script>
  </body>
</html>
