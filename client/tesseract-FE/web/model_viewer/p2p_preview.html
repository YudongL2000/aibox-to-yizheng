<!--
  [INPUT]: 依赖 ZLMRTCClient.js 与 p2p_preview.js 提供的 camera p2p 连接能力。
  [OUTPUT]: 对外提供 camera p2p preview iframe 宿主页，承载视频画面、状态文本与 streamUrl 诊断。
  [POS]: web/model_viewer 的 camera 预览静态入口，被 Flutter preview pane 通过 iframe 嵌入。
  [PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
-->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera P2P Preview</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0e1a;
        color: rgba(255, 255, 255, 0.88);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
      }
      .shell {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        box-sizing: border-box;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.62);
      }
      .video-wrap {
        position: relative;
        flex: 1;
        min-height: 0;
        border-radius: 16px;
        overflow: hidden;
        background: linear-gradient(135deg, rgba(0, 217, 255, 0.08), rgba(122, 229, 130, 0.08));
        border: 1px solid rgba(0, 217, 255, 0.16);
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #05070d;
      }
      .overlay {
        position: absolute;
        inset: auto 12px 12px 12px;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(5, 7, 13, 0.72);
        backdrop-filter: blur(8px);
        font-size: 12px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(0, 217, 255, 0.12);
        color: #00d9ff;
        font-size: 11px;
        font-weight: 600;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      .stream {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
    <script src="./ZLMRTCClient.js"></script>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <span class="badge"><span class="dot"></span>Camera P2P Preview</span>
        <span id="stream-url" class="stream">等待 streamUrl</span>
      </div>
      <div class="video-wrap">
        <video id="video" autoplay playsinline controls muted></video>
        <div class="overlay" id="status">等待 streamUrl</div>
      </div>
    </div>
    <script type="module" src="./p2p_preview.js"></script>
  </body>
</html>
